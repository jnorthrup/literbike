<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Literbike Control Plane</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg class=\"menu-icon\" xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 220'><path d='M 24 74 C 54 70 68 82 74 106 L 74 202' fill='none' stroke='%23000000' stroke-width='13' stroke-linecap='round'/><path d='M 176 74 C 146 70 132 82 126 106 L 126 202' fill='none' stroke='%23000000' stroke-width='13' stroke-linecap='round'/><circle cx='100' cy='100' r='22' fill='none' stroke='%23000000' stroke-width='9'/><line x1='74' y1='132' x2='126' y2='132' stroke='%23000000' stroke-width='9' stroke-linecap='round'/><path d='M 74 202 A 31 41 0 0 1 126 202' fill='none' stroke='%23000000' stroke-width='13' stroke-linecap='round'/></svg>">
    <style>
        :root {
            --bg: #081018;
            --bg-alt: #0d1722;
            --card: rgba(8, 16, 24, 0.86);
            --accent: #6ef1b6;
            --text: #e6edf3;
            --muted: #95a8b8;
            --line: rgba(117, 196, 255, 0.18);
        }
        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: "IBM Plex Mono", monospace;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .container { padding: 2rem; max-width: 1200px; margin: 0 auto; width: 100%; box-sizing: border-box; }
        header { margin-bottom: 3rem; display: flex; justify-content: space-between; align-items: flex-start; }
        .brand h1 { margin: 0; font-size: 1.5rem; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); }
        .brand p { margin: 0.5rem 0 0; color: var(--muted); font-size: 0.8rem; }
        
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 1.5rem; }
        .card { background: var(--card); border: 1px solid var(--line); border-radius: 8px; padding: 1.5rem; position: relative; }
        .card-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .tag { font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; border: 1px solid var(--accent); color: var(--accent); font-weight: bold; }
        .card h2 { margin: 0; font-size: 1.1rem; }
        .card-copy { font-size: 0.85rem; color: var(--muted); margin: 1rem 0; line-height: 1.5; }
        
        .code-block { background: rgba(0,0,0,0.3); padding: 0.8rem; border-radius: 4px; font-size: 0.75rem; margin: 0.5rem 0; word-break: break-all; color: var(--accent); }
        .btn-launch { width: 100%; padding: 0.8rem; background: transparent; border: 1px solid var(--accent); color: var(--accent); font-family: inherit; font-weight: bold; cursor: pointer; transition: all 0.2s; margin-top: 1rem; }
        .btn-launch:hover { background: var(--accent); color: var(--bg); }

        /* Visual QA */
        #vqa { margin-bottom: 3rem; }
        .screen-wrap { background: #000; border-radius: 8px; overflow: hidden; position: relative; aspect-ratio: 16/9; border: 1px solid var(--line); }
        #test-pattern { width: 100%; height: 100%; object-fit: contain; filter: contrast(1.2) brightness(0.8); }
        .scanlines { position: absolute; inset: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%); background-size: 100% 4px; pointer-events: none; }
        .noise { position: absolute; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E"); opacity: 0.05; pointer-events: none; }
        
        .status-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg-alt); padding: 0.5rem 2rem; border-top: 1px solid var(--line); font-size: 0.7rem; display: flex; gap: 2rem; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #333; display: inline-block; margin-right: 5px; }
        .dot.active { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="brand" style="display: flex; align-items: center; gap: 1rem;">
                <img src="literbike.png" alt="Literbike" style="width: 48px; height: 48px;">
                <div>
                    <h1>Literbike Control Plane</h1>
                    <p id="active-route-label">DISCONNECTED</p>
                </div>
            </div>
            <div class="status-box">
                <span id="signal-dot" class="dot"></span>
                <span id="signal-status">ACQUIRING SIGNAL...</span>
            </div>
        </header>

        <section id="vqa" hidden>
            <div class="card-head"><span class="tag">VISUAL QA</span><h2>SIGNAL LOCKED</h2></div>
            <div class="screen-wrap">
                <img src="literbike.png" alt="V-Rod Pattern" id="test-pattern">
                <div class="scanlines"></div>
                <div class="noise"></div>
            </div>
        </section>

        <div id="workbench-grid" class="card-grid">
            <!-- Dynamic lanes will be injected here -->
        </div>
    </div>

    <div class="status-bar">
        <span>BACKPLANE: <strong id="backplane-status">OFFLINE</strong></span>
        <span>MODELS: <strong id="model-count">0</strong></span>
        <span>KEYS: <strong id="key-count">0</strong></span>
    </div>

    <script>
        const MODELMUX_URL = 'http://localhost:8888';
        const workbench = document.getElementById('workbench-grid');
        const backplaneStatus = document.getElementById('backplane-status');
        const modelCount = document.getElementById('model-count');
        const keyCount = document.getElementById('key-count');
        const signalDot = document.getElementById('signal-dot');
        const signalStatus = document.getElementById('signal-status');
        const activeRouteLabel = document.getElementById('active-route-label');
        const vqa = document.getElementById('vqa');
        const patternImg = document.getElementById('test-pattern');

        async function fetchState() {
            try {
                const response = await fetch(`${MODELMUX_URL}/toolbar/state`);
                if (response.ok) {
                    const state = await response.json();
                    renderLanes(state.lanes);
                    renderStatus(state);
                }
            } catch (e) {
                backplaneStatus.textContent = 'OFFLINE';
                signalDot.className = 'dot';
                signalStatus.textContent = 'LINK LOST';
            }
        }

        function renderLanes(lanes) {
            if (!lanes) return;
            workbench.innerHTML = lanes.map(lane => `
                <article class="card">
                    <div class="card-head">
                        <span class="tag">${lane.provider.toUpperCase()}</span>
                        <h2>${lane.title}</h2>
                    </div>
                    <p class="card-copy">Mapped lane for ${lane.model} via ${lane.host}.</p>
                    <div class="code-block">${lane.route}</div>
                    <button class="btn-launch" onclick="launchLane('${lane.route}', '${lane.host}', '${lane.model}')">LAUNCH LINK</button>
                </article>
            `).join('');
        }

        function renderStatus(state) {
            backplaneStatus.textContent = 'CONNECTED';
            modelCount.textContent = state.dynamic_models.length;
            keyCount.textContent = state.env.keys.filter(k => k.is_set).length;
            
            const routeLabel = [state.route.provider, state.route.model].filter(Boolean).join(' / ') || state.route.family;
            activeRouteLabel.textContent = routeLabel.toUpperCase();
            
            if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.updateTitle) {
                window.webkit.messageHandlers.updateTitle.postMessage(routeLabel);
            }

            signalDot.className = 'dot active';
            signalStatus.textContent = 'SIGNAL LOCKED';
        }

        window.launchLane = async (route, host, model) => {
            signalStatus.textContent = 'TUNING...';
            try {
                const resp = await fetch(`http://${host}/probe`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ model, route, action: 'launch' })
                });
                if (resp.ok) {
                    const result = await resp.json();
                    if (result.signal_locked) {
                        if (result.evidence) {
                            patternImg.src = result.evidence.startsWith('/') ? result.evidence.slice(1) : result.evidence;
                        }
                        vqa.hidden = false;
                        vqa.scrollIntoView({ behavior: 'smooth' });
                    }
                    fetchState();
                }
            } catch (e) {
                signalStatus.textContent = 'TUNING FAILED';
            }
        };

        fetchState();
        setInterval(fetchState, 5000);
    </script>
</body>
</html>

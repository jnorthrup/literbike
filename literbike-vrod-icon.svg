<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="400" height="440">
  <!-- left handlebar + fork -->
  <path
    id="left-fork"
    d="M 12 72 C 45 68 60 80 66 105 L 66 208"
    fill="none"
    stroke="black"
    stroke-width="9"
    stroke-linecap="round"
  />
  <!-- right handlebar + fork (mirrored) -->
  <use href="#left-fork" transform="translate(200,0) scale(-1,1)"/>

  <!-- headlight -->
  <circle cx="100" cy="99" r="27" fill="black" stroke="black" stroke-width="3.5"/>

  <!-- crossbar -->
  <line x1="66" y1="130" x2="134" y2="130" stroke="black" stroke-width="3.5" stroke-linecap="round"/>

  <!-- tire (parallel arcs) -->
  <path d="M 66 208 A 34 44 0 0 1 134 208" fill="none" stroke="black" stroke-width="9" stroke-linecap="round"/>
  <path d="M 66 208 A 34 28 0 0 1 134 208" fill="none" stroke="black" stroke-width="3.5" stroke-linecap="round"/>
</svg>
